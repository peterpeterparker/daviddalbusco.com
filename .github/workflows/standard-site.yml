name: Standard.Site

on:
  push:
    branches: [main]
    paths:
      - 'src/blog/**'

jobs:
  standard-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: peterpeterparker/blog-to-standard-site@feat/local-docker
        with:
          blog_posts_path: 'src/blog'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          at_proto_app_password: ${{ secrets.AT_PROTO_APP_PASSWORD }}
          at_proto_did: 'did:plc:fxmgj7lnas3ewnc3hmpx2vg6'
          at_proto_publication_rkey: '3mnjy5srkem2h'
